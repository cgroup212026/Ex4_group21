<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Game</title>
    <link href="../CSS/AddGame.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../CSS/Login.css" rel="stylesheet" />
    <script src="../Scripts/ajaxCall.js"></script>
    <script src="../Scripts/UpdateGame.js"></script>

</head>

<body>

    <a href="./index.html" id="back-btn">Back</a>

    <h1>Add New Game</h1>
    <h3>Create a new game and add it to your collection</h3>

    <div class="form-card">
        <form id="UpdateGameForm">

            <div class="form-grid">
                <div class="form-group">
                    <label for="gameId">Id *</label>
                    <input type="text" id="gameId" name="Id" required>
                </div>

                <div class="form-group">
                    <label for="gameName">Name *</label>
                    <input type="text" id="gameName" name="name" required>
                </div>

                <div class="form-group full-width">
                    <label for="steamUrl">Steam URL *</label>
                    <input type="url" id="steamUrl" name="steamUrl" required>
                </div>

                <div class="form-group full-width">
                    <label for="imageUrl">Image URL *</label>
                    <input type="url" id="imageUrl" name="image" required>
                </div>

                <div class="form-group">
                    <label for="releaseDate">Release Date</label>
                    <input type="text" id="releaseDate" name="releaseDate" placeholder="Example: 2024">
                </div>

                <div class="form-group full-width">
                    <label for="reviewSummary">Review Summary</label>
                    <input type="number" id="reviewSummary" name="reviewSummary" placeholder="Enter review score 0-100" min="0" max="100" step="0.01">
                </div>

                <div class="form-group">
                    <label for="price">Price *</label>
                    <input type="number" id="price" name="price" min="0" max="100" required>
                </div>

                <div class="form-group full-width">
                    <label for="tags">Tags</label>
                    <div class="tags-checkbox-group">

                    </div>

                </div>

                <div class="form-group full-width">
                    <label>Supported Platforms</label>

                    <div class="checkbox-area">
                        <label>
                            <input type="checkbox" id="windows" name="windows">
                            Windows
                        </label>

                        <label>
                            <input type="checkbox" id="mac" name="mac">
                            Mac
                        </label>

                        <label>
                            <input type="checkbox" id="linux" name="linux">
                            Linux
                        </label>
                    </div>
                </div>

            </div>

            <button type="submit" class="submit-btn">Update Game</button>

        </form>
    </div>

</body>
</html>
