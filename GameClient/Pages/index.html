<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Games</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="./../Scripts/ajaxCall.js"></script>
    <link href="../CSS/style.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.19/css/jquery.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.19/css/dataTables.bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.2.3/css/responsive.dataTables.min.css">
    <script type="text/javascript" src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/responsive/2.2.3/js/dataTables.responsive.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/1.10.19/js/dataTables.bootstrap.min.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script type="text/javascript" src="./../Scripts/indexScript.js"></script>

</head>

<body>
    <h1>Steam Games</h1>

    <h3>Unleash Your Library: 200+ Worlds, One Click Away</h3>
    <div id="user-controls">
        <h3 id="user-greeting"></h3>
        <button id="logout-btn">Logout</button>
        <button id="Edit">Edit Profile</button>
        <dialog class="form-popup" id="myForm">
            <form action="/action_page.php" class="form-container" id="popform">
                <h1>Edit Profile</h1>

                <label for="Username"><b>UserName</b></label>
                <input type="text" placeholder="Enter Name" name="name" id="popname" required>

                <label for="psw"><b>Password</b></label>
                <input type="password" placeholder="Enter Password" name="psw" id="poppass" required pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}">

                <button type="submit" class="btn">Update Profile</button>
                <button type="button" class="btn cancel" onclick="closeForm()">Close</button>
            </form>
        </dialog>
    </div>

    <div id="toolbar">
        <button class="special-btn" id="my-games-btn">My Games</button>

        <div class="search-group">
            <input type="text" id="search-input" placeholder="Search..">
        </div>

        <div class="filter-group">
            <label>OS:</label>
            <button class="filter-btn os-btn" data-os="windows">Windows</button>
            <button class="filter-btn os-btn" data-os="mac">Mac</button>
            <button class="filter-btn os-btn" data-os="linux">Linux</button>
        </div>

        <div class="sort-group">
            <label>Sort By:</label>
            <select id="sort-select">
                <option value="none">Select...</option>
                <option value="name">Name (A-Z)</option>
                <option value="price-low">Price (Low to High)</option>
                <option value="price-high">Price (High to Low)</option>
            </select>
        </div>

        <div class="quick-filters">
            <button class="special-btn" id="free-only-btn">Free to Play</button>
            <button class="special-btn" id="reset-filters">Reset All</button>
        </div>

        <div class="tag-filter">
            <!--<button id="toggleViewBtn">Show Table View</button>-->
            <label class="switch">
                <input type="checkbox" id="viewToggle">
                <span class="slider round"></span>
            </label>
            <input list="tagsList" id="tagSelect" placeholder="Choose tag...">
            <datalist id="tagsList"></datalist>
            <button type="button" id="addTagBtn" onclick="addSelectedTag()">Add Tag</button>

            <select id="Removetags">
                <option value="">Choose tag...</option>
            </select>

            <button type="button" id="removeTagBtn" onclick="removeSelectedTag()">Remove Tag</button>
            <button type="button" id="SearchByTags" onclick="searchByTags()">Search</button>

            <button type="button" id="Recomendation" onclick="RecomendationByTags()">Recomendations</button>
        </div>

        <div id="selectedTagsContainer"></div>

        <div id="selectedTagsContainer"></div>
    </div>

    <button id="load-btn">Load Games</button>

    <div class="card-wrapper">
    </div>

    <!--Table form-->

    <div id="tableView" style="display:none">
        <table id="gamesTable" class="display responsive nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Release Date</th>
                    <th>Windows</th>
                    <th>Mac</th>
                    <th>Linux</th>
                    <th>Edit</th>
                    <th>Review</th>
                </tr>
            </thead>
            <tbody id="gamesTableBody"></tbody>
        </table>
    </div>

</body>

</html>
